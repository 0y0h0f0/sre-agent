name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check apps packages tests
      - name: Mypy
        run: mypy apps packages
      - name: Pytest coverage
        run: pytest tests/unit tests/integration --cov=apps --cov=packages --cov-report=term-missing --cov-fail-under=80
      - name: Smoke eval
        run: python -m packages.evals.runner --suite smoke --output reports/eval-smoke.json

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Vitest coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Playwright smoke
        run: npm run test:e2e
