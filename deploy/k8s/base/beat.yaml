apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
  namespace: sre-agent
  labels:
    app: beat
spec:
  # MUST remain single-replica — Celery Beat scheduler requires global uniqueness
  replicas: 1
  selector:
    matchLabels:
      app: beat
  template:
    metadata:
      labels:
        app: beat
    spec:
      serviceAccountName: sre-agent
      containers:
        - name: beat
          image: sre-agent:latest
          imagePullPolicy: Never
          command: ["celery", "-A", "apps.worker.tasks:celery_app", "beat", "--loglevel=INFO"]
          envFrom:
            - configMapRef:
                name: sre-agent-config
            - secretRef:
                name: sre-agent-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      restartPolicy: Always
