apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-agent
  namespace: sre-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sre-agent-role
  namespace: sre-agent
rules:
  # === Read-only diagnostics (collect_k8s node) ===
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "events", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]

  # === Discovery (K8sDiscovery + BackendEndpointDetector) ===
  # Included above: services, endpoints, configmaps, ingresses, deployments,
  # statefulsets, daemonsets. Live executor write permissions are deliberately
  # not part of the base manifest.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-agent-binding
  namespace: sre-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sre-agent-role
subjects:
  - kind: ServiceAccount
    name: sre-agent
    namespace: sre-agent
