# =============================================================================
# 此文件为 Secret 字段参考文档，不再直接作为 Kustomize resource 使用。
# Secret 由 secretGenerator 从 .env.secret 文件自动生成（见 kustomization.yaml）。
# 使用方式: cp .env.secret.example .env.secret && vim .env.secret && kubectl apply -k .
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: sre-agent-secret
  namespace: sre-agent
type: Opaque
stringData:
  # === Database & Cache (REQUIRED — replace with your actual values) ===
  DATABASE_URL: "postgresql+psycopg://sre:changeme@postgres.sre-agent.svc.cluster.local:5432/sre"
  REDIS_URL: "redis://redis.sre-agent.svc.cluster.local:6379/0"
  CELERY_BROKER_URL: "redis://redis.sre-agent.svc.cluster.local:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis.sre-agent.svc.cluster.local:6379/2"

  # === LLM API Key (only needed if LLM_PROVIDER is not disabled/fake) ===
  LLM_API_KEY: ""

  # === SMTP Credentials ===
  SMTP_USER: ""
  SMTP_PASSWORD: ""

  # === Alertmanager Read Token ===
  ALERTMANAGER_READ_TOKEN: ""

  # === API Key Initial Seed (generates first operator key on startup) ===
  API_KEY_INITIAL_SEED: ""
