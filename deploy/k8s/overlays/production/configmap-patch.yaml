apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-agent-config
  namespace: sre-agent
data:
  # Production overrides — ensures safety defaults are enforced
  APP_ENV: "production"
  LLM_PROVIDER: "disabled"
  EXECUTOR_BACKEND: "fixture"
  TRACE_BACKEND: "disabled"
  TRACE_ENABLED: "false"
  K8S_BACKEND: "live"
  # Target namespaces where your backend projects run (comma-separated).
  # Discovery scans all listed namespaces; diagnosis queries cross-namespace.
  K8S_NAMESPACE: "production,staging"
  EXECUTOR_K8S_NAMESPACE: "production"
  DISCOVERY_ENABLED: "true"
  DISCOVERY_APPLY_MODE: "inherit"
  AUTOMATION_LEVEL: "supervised"
  API_KEY_AUTH_ENABLED: "true"
  CORS_ALLOW_ORIGINS: "https://sre-agent.example.com"
  WEB_BASE_URL: "https://sre-agent.example.com"
