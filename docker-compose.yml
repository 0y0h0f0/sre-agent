services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sre
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre -d sre"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6378:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    volumes:
      - ./deploy/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  otel-collector:
    image: otel/opentelemetry-collector:0.114.0
    command: ["--config=/etc/otel-collector.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./deploy/otel-collector.yml:/etc/otel-collector.yml:ro

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro

  demo-service:
    build: .
    command: uvicorn demo.demo_service.main:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "8080:8080"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      - otel-collector
    volumes:
      - .:/app
  web:
    image: node:22-alpine
    working_dir: /app/apps/web
    command: sh -c "npm install && exec npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app

  api:
    build: .
    command: sh -c "alembic upgrade head && exec uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://sre:sre@postgres:5432/sre
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      OTEL_COLLECTOR_URL: http://otel-collector:4318
      TRACE_FIXTURE_PATH: demo/faults/traces.json
      GIT_CHANGES_FIXTURE_PATH: demo/faults/git_changes.json
      LLM_PROVIDER: fake
      EMBEDDING_PROVIDER: fake
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-auto}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-30}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-sre-agent@example.local}
      SRE_EMAIL_LIST: ${SRE_EMAIL_LIST:-}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5173}
      NOTIFICATION_TIMEZONE: ${NOTIFICATION_TIMEZONE:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A apps.worker.tasks:celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://sre:sre@postgres:5432/sre
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      OTEL_COLLECTOR_URL: http://otel-collector:4318
      TRACE_FIXTURE_PATH: demo/faults/traces.json
      GIT_CHANGES_FIXTURE_PATH: demo/faults/git_changes.json
      LLM_PROVIDER: fake
      EMBEDDING_PROVIDER: fake
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-auto}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-30}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-sre-agent@example.local}
      SRE_EMAIL_LIST: ${SRE_EMAIL_LIST:-}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5173}
      NOTIFICATION_TIMEZONE: ${NOTIFICATION_TIMEZONE:-UTC}
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A apps.worker.tasks:celery_app beat --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://sre:sre@postgres:5432/sre
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      OTEL_COLLECTOR_URL: http://otel-collector:4318
      TRACE_FIXTURE_PATH: demo/faults/traces.json
      GIT_CHANGES_FIXTURE_PATH: demo/faults/git_changes.json
      LLM_PROVIDER: fake
      EMBEDDING_PROVIDER: fake
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-auto}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-30}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-sre-agent@example.local}
      SRE_EMAIL_LIST: ${SRE_EMAIL_LIST:-}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5173}
      NOTIFICATION_TIMEZONE: ${NOTIFICATION_TIMEZONE:-UTC}
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres-data:
  loki-data:
  grafana-data:
