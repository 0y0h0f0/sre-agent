services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sre
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre -d sre"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6378:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    volumes:
      - ./deploy/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  otel-collector:
    image: otel/opentelemetry-collector:0.114.0
    command: ["--config=/etc/otel-collector.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./deploy/otel-collector.yml:/etc/otel-collector.yml:ro

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro

  # Mailpit — local SMTP testing (docker compose --profile dev up mailpit)
  # Web UI: http://localhost:8025  SMTP: mailpit:1025 (no auth)
  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "8025:8025"
      - "1025:1025"
    profiles:
      - dev
    restart: unless-stopped

  demo-service:
    build: .
    command: uvicorn demo.demo_service.main:app --host 0.0.0.0 --port 8080 --reload
    healthcheck:
      disable: true
    ports:
      - "8080:8080"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      - otel-collector
    volumes:
      - .:/app
  web:
    image: node:22-alpine
    working_dir: /app/apps/web
    command: sh -c "npm install && exec npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app

  api:
    build: .
    command: sh -c "alembic upgrade head && exec uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
    # Scale horizontally: docker compose up --scale api=3
    environment:
      DATABASE_URL: postgresql+psycopg://sre:sre@postgres:5432/sre
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      OTEL_COLLECTOR_URL: http://otel-collector:4318
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-fake-diagnosis-model}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://localhost:8001/v1}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-512}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_REASONING_ENABLED: ${LLM_REASONING_ENABLED:-false}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-medium}
      # Embedding & RAG
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
      EMBEDDING_BGE_ZH_URL: ${EMBEDDING_BGE_ZH_URL:-http://localhost:8083}
      EMBEDDING_TEXT2VEC_URL: ${EMBEDDING_TEXT2VEC_URL:-http://localhost:8084}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-fake}
      RERANKER_COHERE_API_KEY: ${RERANKER_COHERE_API_KEY:-}
      RERANKER_JINA_BASE_URL: ${RERANKER_JINA_BASE_URL:-http://localhost:8081/v1}
      RERANKER_BGE_BASE_URL: ${RERANKER_BGE_BASE_URL:-http://localhost:8082}
      # Tool backends
      TRACE_BACKEND: ${TRACE_BACKEND:-fixture}
      TRACE_FIXTURE_PATH: ${TRACE_FIXTURE_PATH:-demo/faults/traces.json}
      DEPLOYMENT_BACKEND: ${DEPLOYMENT_BACKEND:-fixture}
      GIT_CHANGES_FIXTURE_PATH: ${GIT_CHANGES_FIXTURE_PATH:-demo/faults/git_changes.json}
      K8S_BACKEND: ${K8S_BACKEND:-fixture}
      DB_DIAGNOSTICS_BACKEND: ${DB_DIAGNOSTICS_BACKEND:-fixture}
      DB_DIAGNOSTICS_FIXTURE_PATH: ${DB_DIAGNOSTICS_FIXTURE_PATH:-demo/faults/db_diagnostics.json}
      DB_DIAGNOSTICS_URL: ${DB_DIAGNOSTICS_URL:-}
      # Trace backend URLs
      JAEGER_URL: ${JAEGER_URL:-http://jaeger:16686}
      TEMPO_URL: ${TEMPO_URL:-http://tempo:3200}
      # Deployment backend config
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_REPO: ${GITHUB_REPO:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ARGOCD_URL: ${ARGOCD_URL:-http://argocd:8080}
      ARGOCD_TOKEN: ${ARGOCD_TOKEN:-}
      # K8s live backend
      K8S_NAMESPACE: ${K8S_NAMESPACE:-default}
      K8S_FIXTURE_PATH: ${K8S_FIXTURE_PATH:-demo/faults/k8s.json}
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-auto}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-30}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-sre-agent@example.local}
      SRE_EMAIL_LIST: ${SRE_EMAIL_LIST:-}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5173}
      NOTIFICATION_TIMEZONE: ${NOTIFICATION_TIMEZONE:-UTC}
      # Auth & CORS
      API_KEY_AUTH_ENABLED: ${API_KEY_AUTH_ENABLED:-false}
      API_KEY_INITIAL_SEED: ${API_KEY_INITIAL_SEED:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A apps.worker.tasks:celery_app worker --loglevel=INFO
    healthcheck:
      disable: true
    restart: unless-stopped
    # Scale horizontally: docker compose up --scale worker=3
    environment:
      DATABASE_URL: postgresql+psycopg://sre:sre@postgres:5432/sre
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      OTEL_COLLECTOR_URL: http://otel-collector:4318
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-fake-diagnosis-model}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://localhost:8001/v1}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-512}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_REASONING_ENABLED: ${LLM_REASONING_ENABLED:-false}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-medium}
      # Embedding & RAG
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
      EMBEDDING_BGE_ZH_URL: ${EMBEDDING_BGE_ZH_URL:-http://localhost:8083}
      EMBEDDING_TEXT2VEC_URL: ${EMBEDDING_TEXT2VEC_URL:-http://localhost:8084}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-fake}
      RERANKER_COHERE_API_KEY: ${RERANKER_COHERE_API_KEY:-}
      RERANKER_JINA_BASE_URL: ${RERANKER_JINA_BASE_URL:-http://localhost:8081/v1}
      RERANKER_BGE_BASE_URL: ${RERANKER_BGE_BASE_URL:-http://localhost:8082}
      # Tool backends
      TRACE_BACKEND: ${TRACE_BACKEND:-fixture}
      TRACE_FIXTURE_PATH: ${TRACE_FIXTURE_PATH:-demo/faults/traces.json}
      DEPLOYMENT_BACKEND: ${DEPLOYMENT_BACKEND:-fixture}
      GIT_CHANGES_FIXTURE_PATH: ${GIT_CHANGES_FIXTURE_PATH:-demo/faults/git_changes.json}
      K8S_BACKEND: ${K8S_BACKEND:-fixture}
      DB_DIAGNOSTICS_BACKEND: ${DB_DIAGNOSTICS_BACKEND:-fixture}
      DB_DIAGNOSTICS_FIXTURE_PATH: ${DB_DIAGNOSTICS_FIXTURE_PATH:-demo/faults/db_diagnostics.json}
      DB_DIAGNOSTICS_URL: ${DB_DIAGNOSTICS_URL:-}
      # Trace backend URLs
      JAEGER_URL: ${JAEGER_URL:-http://jaeger:16686}
      TEMPO_URL: ${TEMPO_URL:-http://tempo:3200}
      # Deployment backend config
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_REPO: ${GITHUB_REPO:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ARGOCD_URL: ${ARGOCD_URL:-http://argocd:8080}
      ARGOCD_TOKEN: ${ARGOCD_TOKEN:-}
      # K8s live backend
      K8S_NAMESPACE: ${K8S_NAMESPACE:-default}
      K8S_FIXTURE_PATH: ${K8S_FIXTURE_PATH:-demo/faults/k8s.json}
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-auto}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-30}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-sre-agent@example.local}
      SRE_EMAIL_LIST: ${SRE_EMAIL_LIST:-}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5173}
      NOTIFICATION_TIMEZONE: ${NOTIFICATION_TIMEZONE:-UTC}
      # Auth
      API_KEY_AUTH_ENABLED: ${API_KEY_AUTH_ENABLED:-false}
      API_KEY_INITIAL_SEED: ${API_KEY_INITIAL_SEED:-}
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A apps.worker.tasks:celery_app beat --loglevel=INFO
    healthcheck:
      disable: true
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://sre:sre@postgres:5432/sre
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      OTEL_COLLECTOR_URL: http://otel-collector:4318
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-fake-diagnosis-model}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://localhost:8001/v1}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-512}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_REASONING_ENABLED: ${LLM_REASONING_ENABLED:-false}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-medium}
      # Embedding & RAG
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
      EMBEDDING_BGE_ZH_URL: ${EMBEDDING_BGE_ZH_URL:-http://localhost:8083}
      EMBEDDING_TEXT2VEC_URL: ${EMBEDDING_TEXT2VEC_URL:-http://localhost:8084}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-fake}
      RERANKER_COHERE_API_KEY: ${RERANKER_COHERE_API_KEY:-}
      RERANKER_JINA_BASE_URL: ${RERANKER_JINA_BASE_URL:-http://localhost:8081/v1}
      RERANKER_BGE_BASE_URL: ${RERANKER_BGE_BASE_URL:-http://localhost:8082}
      # Tool backends
      TRACE_BACKEND: ${TRACE_BACKEND:-fixture}
      TRACE_FIXTURE_PATH: ${TRACE_FIXTURE_PATH:-demo/faults/traces.json}
      DEPLOYMENT_BACKEND: ${DEPLOYMENT_BACKEND:-fixture}
      GIT_CHANGES_FIXTURE_PATH: ${GIT_CHANGES_FIXTURE_PATH:-demo/faults/git_changes.json}
      K8S_BACKEND: ${K8S_BACKEND:-fixture}
      DB_DIAGNOSTICS_BACKEND: ${DB_DIAGNOSTICS_BACKEND:-fixture}
      DB_DIAGNOSTICS_FIXTURE_PATH: ${DB_DIAGNOSTICS_FIXTURE_PATH:-demo/faults/db_diagnostics.json}
      DB_DIAGNOSTICS_URL: ${DB_DIAGNOSTICS_URL:-}
      # Trace backend URLs
      JAEGER_URL: ${JAEGER_URL:-http://jaeger:16686}
      TEMPO_URL: ${TEMPO_URL:-http://tempo:3200}
      # Deployment backend config
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_REPO: ${GITHUB_REPO:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ARGOCD_URL: ${ARGOCD_URL:-http://argocd:8080}
      ARGOCD_TOKEN: ${ARGOCD_TOKEN:-}
      # K8s live backend
      K8S_NAMESPACE: ${K8S_NAMESPACE:-default}
      K8S_FIXTURE_PATH: ${K8S_FIXTURE_PATH:-demo/faults/k8s.json}
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-auto}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-30}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-sre-agent@example.local}
      SRE_EMAIL_LIST: ${SRE_EMAIL_LIST:-}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5173}
      NOTIFICATION_TIMEZONE: ${NOTIFICATION_TIMEZONE:-UTC}
      # Auth
      API_KEY_AUTH_ENABLED: ${API_KEY_AUTH_ENABLED:-false}
      API_KEY_INITIAL_SEED: ${API_KEY_INITIAL_SEED:-}
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres-data:
  loki-data:
  grafana-data:
