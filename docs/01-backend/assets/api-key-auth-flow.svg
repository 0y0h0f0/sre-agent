<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">API Key 鉴权与 WebSocket Ticket</title>
  <desc id="desc">HTTP API key 中间件、scope 校验、bootstrap seed 限制和 WebSocket ticket 认证流程图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#b91c1c"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 44px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle}
      .subtitle{font:400 23px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}
      .lane{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
      .lane-title{font:700 27px Arial,"Noto Sans CJK SC",sans-serif;fill:#334155}
      .request{fill:#eff6ff;stroke:#2563eb;stroke-width:3;rx:9}
      .auth{fill:#f0fdfa;stroke:#0f766e;stroke-width:3;rx:9}
      .scope{fill:#ecfeff;stroke:#0891b2;stroke-width:3;rx:9}
      .warn{fill:#fffbeb;stroke:#d97706;stroke-width:3;rx:9}
      .deny{fill:#fef2f2;stroke:#dc2626;stroke-width:3;rx:9}
      .ok{fill:#f0fdf4;stroke:#16a34a;stroke-width:3;rx:9}
      .label{font:700 24px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}
      .small{font:700 20px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}
      .note{font:400 21px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}
      .branch{font:700 18px Arial,"Noto Sans CJK SC",sans-serif;fill:#334155;text-anchor:middle}
      .arrow{stroke:#334155;stroke-width:3.5;fill:none;marker-end:url(#arrow)}
      .arrow-green{stroke:#15803d;stroke-width:3.5;fill:none;marker-end:url(#arrow-green)}
      .arrow-red{stroke:#b91c1c;stroke-width:3.5;fill:none;marker-end:url(#arrow-red)}
      .dash{stroke-dasharray:10 8}
    </style>
  </defs>

  <rect class="bg" width="1800" height="1040"/>
  <text class="title" x="900" y="66">API Key 鉴权与 WebSocket Ticket</text>
  <text class="subtitle" x="900" y="105">认证中间件负责身份；scope dependency 控制权限；WebSocket 通过短期 ticket 入站</text>

  <rect class="lane" x="70" y="145" width="1660" height="220"/>
  <text class="lane-title" x="110" y="195">HTTP 中间件路径</text>
  <rect class="request" x="135" y="245" width="220" height="76"/>
  <text class="small" x="245" y="270">HTTP Request</text>
  <text class="small" x="245" y="296">任意 API 路径</text>
  <rect class="warn" x="435" y="245" width="230" height="76"/>
  <text class="small" x="550" y="270">Auth middleware</text>
  <text class="small" x="550" y="296">检查开关和路径</text>
  <rect class="warn" x="745" y="245" width="230" height="76"/>
  <text class="small" x="860" y="270">Protected path</text>
  <text class="small" x="860" y="296">需要 Bearer token</text>
  <rect class="auth" x="1055" y="245" width="230" height="76"/>
  <text class="small" x="1170" y="270">Bearer token</text>
  <text class="small" x="1170" y="296">读取 Authorization</text>
  <rect class="deny" x="1365" y="245" width="230" height="76"/>
  <text class="small" x="1480" y="270">缺失或无效</text>
  <text class="small" x="1480" y="296">401 UNAUTHORIZED</text>
  <path class="arrow" d="M355 283H435"/>
  <path class="arrow" d="M665 283H745"/>
  <path class="arrow" d="M975 283H1055"/>
  <path class="arrow-red" d="M1285 283H1365"/>
  <path class="arrow-green dash" d="M550 321V380C550 650 1430 650 1570 583"/>

  <rect class="lane" x="70" y="405" width="1660" height="250"/>
  <text class="lane-title" x="110" y="455">身份解析与 Scope</text>
  <rect class="auth" x="135" y="505" width="245" height="78"/>
  <text class="small" x="258" y="530">Bootstrap seed</text>
  <text class="small" x="258" y="556">仅首个 key 前可用</text>
  <rect class="auth" x="470" y="505" width="245" height="78"/>
  <text class="small" x="593" y="530">ApiKeyService.verify</text>
  <text class="small" x="593" y="556">hash / revoked / expiry</text>
  <rect class="scope" x="805" y="505" width="245" height="78"/>
  <text class="small" x="928" y="530">request.state.api_key</text>
  <text class="small" x="928" y="556">写入认证身份</text>
  <rect class="scope" x="1140" y="505" width="245" height="78"/>
  <text class="small" x="1263" y="530">require_scope()</text>
  <text class="small" x="1263" y="556">检查 route 权限</text>
  <rect class="ok" x="1475" y="505" width="190" height="78"/>
  <text class="small" x="1570" y="530">Route</text>
  <text class="small" x="1570" y="556">Service 执行</text>
  <path class="arrow-green" d="M1170 321V385C1170 455 258 455 258 505"/>
  <path class="arrow-green" d="M380 544H470"/>
  <path class="arrow-green" d="M715 544H805"/>
  <path class="arrow-green" d="M1050 544H1140"/>
  <path class="arrow-green" d="M1385 544H1475"/>
  <path class="arrow-red dash" d="M1263 583V625C1263 640 1480 640 1480 321"/>
  <text class="branch" x="1378" y="626">scope 不足为 403</text>

  <rect class="lane" x="70" y="695" width="1660" height="215"/>
  <text class="lane-title" x="110" y="745">WebSocket 认证</text>
  <rect class="request" x="135" y="795" width="245" height="76"/>
  <text class="small" x="258" y="820">Bearer API key</text>
  <text class="small" x="258" y="846">请求 WS ticket</text>
  <rect class="scope" x="470" y="795" width="245" height="76"/>
  <text class="small" x="593" y="820">POST /api/ws/...</text>
  <text class="small" x="593" y="846">生成短期 ticket</text>
  <rect class="scope" x="805" y="795" width="245" height="76"/>
  <text class="small" x="928" y="820">WS connect</text>
  <text class="small" x="928" y="846">?ticket=...</text>
  <rect class="auth" x="1140" y="795" width="245" height="76"/>
  <text class="small" x="1263" y="820">验证 ticket</text>
  <text class="small" x="1263" y="846">失败关闭 4001</text>
  <rect class="ok" x="1475" y="795" width="190" height="76"/>
  <text class="small" x="1570" y="820">Node events</text>
  <text class="small" x="1570" y="846">实时推送</text>
  <path class="arrow" d="M380 833H470"/>
  <path class="arrow-green" d="M715 833H805"/>
  <path class="arrow-green" d="M1050 833H1140"/>
  <path class="arrow-green" d="M1385 833H1475"/>
  <text class="note" x="900" y="965">raw API key 只创建时返回一次；数据库保存 SHA-256 hash；响应后 best-effort 更新 last_used_at</text>
</svg>
