<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="950" viewBox="0 0 1800 950" role="img" aria-labelledby="title desc">
  <title id="title">后端请求与审批恢复</title>
  <desc id="desc">后端请求分层和审批恢复路径流程图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#b45309"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 44px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle}
      .subtitle{font:400 23px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}
      .lane{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
      .lane-title{font:700 28px Arial,"Noto Sans CJK SC",sans-serif;fill:#334155}
      .api{fill:#eff6ff;stroke:#2563eb;stroke-width:3;rx:9}
      .svc{fill:#f0fdfa;stroke:#0f766e;stroke-width:3;rx:9}
      .db{fill:#ecfeff;stroke:#0891b2;stroke-width:3;rx:9}
      .approval{fill:#fffbeb;stroke:#d97706;stroke-width:3;rx:9}
      .worker{fill:#f0fdf4;stroke:#16a34a;stroke-width:3;rx:9}
      .callout{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:9}
      .label{font:700 23px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}
      .small{font:700 20px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}
      .note{font:400 22px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}
      .arrow{stroke:#334155;stroke-width:3.5;fill:none;marker-end:url(#arrow)}
      .arrow-amber{stroke:#b45309;stroke-width:3.5;fill:none;marker-end:url(#arrow-amber)}
    </style>
  </defs>

  <rect class="bg" width="1800" height="950"/>
  <text class="title" x="900" y="66">后端请求与审批恢复</text>
  <text class="subtitle" x="900" y="105">Router 保持薄层；Service 管业务规则；Repository 是数据库边界</text>
  <text class="subtitle" x="900" y="134">审批恢复使用同一个 LangGraph checkpoint，不依赖展示 state</text>

  <rect class="lane" x="70" y="175" width="1660" height="250"/>
  <text class="lane-title" x="115" y="226">告警摄取分层</text>
  <rect class="api" x="135" y="280" width="210" height="72"/>
  <text class="label" x="240" y="316">HTTP Request</text>
  <rect class="api" x="405" y="280" width="210" height="72"/>
  <text class="label" x="510" y="304">Router</text>
  <text class="small" x="510" y="330">校验 / DI</text>
  <rect class="svc" x="675" y="280" width="210" height="72"/>
  <text class="label" x="780" y="304">Service</text>
  <text class="small" x="780" y="330">事务 / 规则</text>
  <rect class="db" x="945" y="280" width="210" height="72"/>
  <text class="label" x="1050" y="304">Repository</text>
  <text class="small" x="1050" y="330">查询 / 写入</text>
  <rect class="db" x="1215" y="280" width="210" height="72"/>
  <text class="label" x="1320" y="316">Model ORM</text>
  <rect class="worker" x="1485" y="280" width="210" height="72"/>
  <text class="label" x="1590" y="304">Commit</text>
  <text class="small" x="1590" y="330">入队 Celery</text>
  <path class="arrow" d="M345 316H405"/>
  <path class="arrow" d="M615 316H675"/>
  <path class="arrow" d="M885 316H945"/>
  <path class="arrow" d="M1155 316H1215"/>
  <path class="arrow" d="M1425 316H1485"/>

  <rect class="lane" x="70" y="480" width="1660" height="255"/>
  <text class="lane-title" x="115" y="532">审批恢复路径</text>
  <rect class="approval" x="115" y="590" width="205" height="72"/>
  <text class="label" x="218" y="626">Approve / Reject</text>
  <rect class="approval" x="375" y="590" width="205" height="72"/>
  <text class="label" x="478" y="614">锁定</text>
  <text class="small" x="478" y="640">approval</text>
  <rect class="approval" x="635" y="590" width="205" height="72"/>
  <text class="label" x="738" y="614">校验 L3</text>
  <text class="small" x="738" y="640">二次确认</text>
  <rect class="approval" x="895" y="590" width="205" height="72"/>
  <text class="label" x="998" y="614">更新状态</text>
  <text class="small" x="998" y="640">approval/action</text>
  <rect class="db" x="1155" y="590" width="205" height="72"/>
  <text class="label" x="1258" y="614">写 audit</text>
  <text class="small" x="1258" y="640">Commit 决策</text>
  <rect class="worker" x="1415" y="590" width="240" height="72"/>
  <text class="label" x="1535" y="614">enqueue resume</text>
  <text class="small" x="1535" y="640">无 waiting 后</text>
  <path class="arrow-amber" d="M320 626H375"/>
  <path class="arrow-amber" d="M580 626H635"/>
  <path class="arrow-amber" d="M840 626H895"/>
  <path class="arrow-amber" d="M1100 626H1155"/>
  <path class="arrow-amber" d="M1360 626H1415"/>

  <rect class="worker" x="690" y="800" width="420" height="74"/>
  <text class="label" x="900" y="824">Worker 读取 checkpoint</text>
  <text class="small" x="900" y="850">thread_id = agent_run_id</text>
  <path class="arrow-amber" d="M1535 662V770H900V800"/>

  <rect class="callout" x="160" y="795" width="260" height="78"/>
  <text class="small" x="290" y="819">state 只是</text>
  <text class="small" x="290" y="846">展示快照</text>
  <rect class="callout" x="1380" y="795" width="260" height="78"/>
  <text class="small" x="1510" y="819">API 不内联</text>
  <text class="small" x="1510" y="846">运行 LangGraph</text>

  <text class="note" x="900" y="920">审批 resume 会重新读取同 run 下每条 approval 的数据库状态，避免单个 decision 放行整个批次</text>
</svg>
