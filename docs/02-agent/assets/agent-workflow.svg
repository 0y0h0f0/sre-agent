<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1550" viewBox="0 0 1800 1550" role="img" aria-labelledby="title desc">
  <title id="title">Agent workflow</title>
  <desc id="desc">LangGraph incident workflow with evidence collection, memory and runbook retrieval, diagnosis, guardrail routing, approval interrupt, execution, verification, report generation, and bounded retry loops.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#15803d"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 44px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle}
      .subtitle{font:400 22px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}
      .lane{fill:#fff;stroke:#cbd5e1;stroke-width:2}
      .lane-title{font:700 24px Arial,"Noto Sans CJK SC",sans-serif;fill:#334155}
      .node-text{font:700 20px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}
      .small{font:700 17px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}
      .note{font:400 17px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}
      .label{font:700 15px Arial,"Noto Sans CJK SC",sans-serif;fill:#334155;text-anchor:middle}
      .loop-label{font:700 15px Arial,"Noto Sans CJK SC",sans-serif;fill:#0e7490;text-anchor:middle}
      .evidence{fill:#eff6ff;stroke:#2563eb;stroke-width:3}
      .memory{fill:#f5f3ff;stroke:#7c3aed;stroke-width:3}
      .diagnosis{fill:#f0fdf4;stroke:#15803d;stroke-width:3}
      .planning{fill:#fff7ed;stroke:#ea580c;stroke-width:3}
      .approval{fill:#fef2f2;stroke:#dc2626;stroke-width:3}
      .execute{fill:#ecfeff;stroke:#0891b2;stroke-width:3}
      .report{fill:#f1f5f9;stroke:#64748b;stroke-width:3}
      .diamond{fill:#fff;stroke:#334155;stroke-width:3}
      .arrow{stroke:#334155;stroke-width:3.2;fill:none;marker-end:url(#arrow)}
      .arrow-blue{stroke:#2563eb;stroke-width:3.2;fill:none;marker-end:url(#arrow-blue)}
      .arrow-green{stroke:#15803d;stroke-width:3.2;fill:none;marker-end:url(#arrow-green)}
      .arrow-orange{stroke:#ea580c;stroke-width:3.2;fill:none;marker-end:url(#arrow-orange)}
      .dash{stroke-dasharray:10 8}
    </style>
  </defs>

  <rect class="bg" width="1800" height="1550"/>
  <text class="title" x="900" y="58">SRE Incident Response Agent Workflow</text>
  <text class="subtitle" x="900" y="92">LangGraph 主路径、人工审批 interrupt、执行验证和三个受预算限制的回路</text>

  <rect class="lane" x="70" y="125" width="1660" height="165" rx="14"/>
  <text class="lane-title" x="105" y="165">1. Evidence + Context</text>
  <rect class="evidence" x="145" y="200" width="230" height="58" rx="8"/>
  <text class="node-text" x="260" y="229">parse_alert</text>
  <rect class="evidence" x="445" y="200" width="230" height="58" rx="8"/>
  <text class="node-text" x="560" y="229">collect_all_evidence</text>
  <rect class="memory" x="745" y="200" width="230" height="58" rx="8"/>
  <text class="node-text" x="860" y="229">retrieve_memory</text>
  <rect class="memory" x="1045" y="200" width="230" height="58" rx="8"/>
  <text class="node-text" x="1160" y="229">cross_incident</text>
  <rect class="memory" x="1345" y="200" width="230" height="58" rx="8"/>
  <text class="node-text" x="1460" y="229">retrieve_runbook</text>
  <path class="arrow" d="M375 229H445"/>
  <path class="arrow" d="M675 229H745"/>
  <path class="arrow" d="M975 229H1045"/>
  <path class="arrow" d="M1275 229H1345"/>

  <rect class="lane" x="70" y="320" width="1660" height="285" rx="14"/>
  <text class="lane-title" x="105" y="360">2. Diagnosis + Bounded Gap Collection</text>
  <rect class="diagnosis" x="1345" y="400" width="230" height="58" rx="8"/>
  <text class="node-text" x="1460" y="429">build_context</text>
  <rect class="diagnosis" x="1045" y="400" width="230" height="58" rx="8"/>
  <text class="node-text" x="1160" y="429">diagnose</text>
  <rect class="diagnosis" x="745" y="400" width="230" height="58" rx="8"/>
  <text class="node-text" x="860" y="429">compress_context</text>
  <polygon class="diamond" points="560,371 700,430 560,489 420,430"/>
  <text class="small" x="560" y="419">missing</text>
  <text class="small" x="560" y="443">evidence?</text>
  <rect class="evidence" x="445" y="525" width="230" height="58" rx="8"/>
  <text class="node-text" x="560" y="554">collect_gap</text>
  <path class="arrow" d="M1460 258V400"/>
  <path class="arrow-green" d="M1345 429H1275"/>
  <path class="arrow-green" d="M1045 429H975"/>
  <path class="arrow-green" d="M745 429H700"/>
  <path class="arrow-blue" d="M560 489V525"/>
  <text class="label" x="620" y="512">YES, max 1 cycle</text>
  <path class="arrow-blue dash" d="M675 554H1460V458"/>
  <text class="loop-label" x="1095" y="580">targeted recollection then rebuild context</text>

  <rect class="lane" x="70" y="635" width="1660" height="185" rx="14"/>
  <text class="lane-title" x="105" y="675">3. Planning + Deterministic Guardrail</text>
  <rect class="planning" x="145" y="705" width="230" height="58" rx="8"/>
  <text class="node-text" x="260" y="734">rank_hypotheses</text>
  <rect class="planning" x="445" y="705" width="230" height="58" rx="8"/>
  <text class="node-text" x="560" y="734">plan_actions</text>
  <rect class="planning" x="745" y="705" width="230" height="58" rx="8"/>
  <text class="node-text" x="860" y="734">guardrail_check</text>
  <polygon class="diamond" points="1160,660 1320,734 1160,808 1000,734"/>
  <text class="small" x="1160" y="722">risk level /</text>
  <text class="small" x="1160" y="746">approval status?</text>
  <path class="arrow" d="M420 430H90V635H260V705"/>
  <text class="label" x="126" y="618">NO</text>
  <path class="arrow-orange" d="M375 734H445"/>
  <path class="arrow-orange" d="M675 734H745"/>
  <path class="arrow-orange" d="M975 734H1000"/>

  <rect class="lane" x="70" y="850" width="1660" height="410" rx="14"/>
  <text class="lane-title" x="105" y="890">4. Approval, Execution + Verify</text>
  <rect class="approval" x="1015" y="890" width="290" height="66" rx="8"/>
  <text class="node-text" x="1160" y="912">human_approval</text>
  <text class="node-text" x="1160" y="938">interrupt</text>
  <polygon class="diamond" points="1160,985 1320,1050 1160,1115 1000,1050"/>
  <text class="small" x="1160" y="1039">approval</text>
  <text class="small" x="1160" y="1063">result?</text>
  <rect class="execute" x="1345" y="895" width="230" height="58" rx="8"/>
  <text class="node-text" x="1460" y="924">take_snapshot</text>
  <rect class="execute" x="1345" y="985" width="230" height="58" rx="8"/>
  <text class="node-text" x="1460" y="1014">execute_action</text>
  <rect class="execute" x="1345" y="1075" width="230" height="58" rx="8"/>
  <text class="node-text" x="1460" y="1104">verify</text>
  <polygon class="diamond" points="1460,1165 1600,1218 1460,1271 1320,1218"/>
  <text class="small" x="1460" y="1207">verification</text>
  <text class="small" x="1460" y="1231">result?</text>
  <path class="arrow" d="M1160 808V890"/>
  <text class="label" x="1090" y="845">L2/L3 waiting</text>
  <path class="arrow-green" d="M1320 734H1460V895"/>
  <text class="label" x="1475" y="820">L0/L1 executable</text>
  <path class="arrow" d="M1160 956V985"/>
  <path class="arrow-green" d="M1320 1050H1330V924H1345"/>
  <text class="label" x="1306" y="876">approved</text>
  <path class="arrow" d="M1460 953V985"/>
  <path class="arrow" d="M1460 1043V1075"/>
  <path class="arrow" d="M1460 1133V1165"/>
  <path class="arrow-orange dash" d="M1000 1050H560V763"/>
  <text class="label" x="760" y="1035">rejected + replan budget remains</text>
  <text class="note" x="1030" y="1138">waiting: stay interrupted until API writes decision and worker resumes</text>
  <path class="arrow-orange dash" d="M1320 1218H560V763"/>
  <text class="loop-label" x="880" y="1200">improving / unchanged / degraded: verify replan, max 2 cycles</text>

  <rect class="lane" x="70" y="1290" width="1660" height="170" rx="14"/>
  <text class="lane-title" x="105" y="1330">5. Report + Memory</text>
  <rect class="report" x="1045" y="1350" width="230" height="58" rx="8"/>
  <text class="node-text" x="1160" y="1379">generate_report</text>
  <rect class="report" x="1345" y="1350" width="230" height="58" rx="8"/>
  <text class="node-text" x="1460" y="1379">persist_memory</text>
  <rect class="report" x="1595" y="1350" width="100" height="58" rx="8"/>
  <text class="node-text" x="1645" y="1379">END</text>
  <path class="arrow" d="M1320 734H1690V1310H1010V1379H1045"/>
  <text class="label" x="1655" y="1015">all L4</text>
  <path class="arrow" d="M1460 1271V1322H1160V1350"/>
  <text class="label" x="930" y="1288">resolved / skipped / unknown / error</text>
  <text class="label" x="930" y="1308">or max cycles</text>
  <path class="arrow" d="M1275 1379H1345"/>
  <path class="arrow" d="M1575 1379H1595"/>
</svg>
