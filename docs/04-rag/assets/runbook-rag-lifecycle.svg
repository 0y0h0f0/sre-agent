<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Runbook RAG 生命周期</title>
  <desc id="desc">Runbook 摄取、检索、草稿审查和发布流程图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,1 L11,6 L0,11 Z" fill="#b91c1c"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 44px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle}
      .subtitle{font:400 23px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}
      .lane{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
      .lane-title{font:700 28px Arial,"Noto Sans CJK SC",sans-serif;fill:#334155}
      .ingest{fill:#ecfeff;stroke:#0891b2;stroke-width:3;rx:9}
      .embed{fill:#f5f3ff;stroke:#7c3aed;stroke-width:3;rx:9}
      .search{fill:#f0fdfa;stroke:#0f766e;stroke-width:3;rx:9}
      .review{fill:#fffbeb;stroke:#d97706;stroke-width:3;rx:9}
      .final{fill:#f0fdf4;stroke:#16a34a;stroke-width:3;rx:9}
      .reject{fill:#fef2f2;stroke:#dc2626;stroke-width:3;rx:9}
      .callout{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:9}
      .label{font:700 23px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}
      .small{font:700 20px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}
      .note{font:700 22px Arial,"Noto Sans CJK SC",sans-serif;fill:#334155;text-anchor:middle;dominant-baseline:central}
      .arrow{stroke:#334155;stroke-width:3.5;fill:none;marker-end:url(#arrow)}
      .arrow-red{stroke:#b91c1c;stroke-width:3.5;fill:none;marker-end:url(#arrow-red)}
    </style>
  </defs>

  <rect class="bg" width="1800" height="980"/>
  <text class="title" x="900" y="66">Runbook RAG 生命周期</text>
  <text class="subtitle" x="900" y="105">Runbook 提供可追溯证据；最终执行权限仍由 Agent Guardrail 和审批链路决定</text>

  <rect class="lane" x="60" y="155" width="1680" height="190"/>
  <text class="lane-title" x="110" y="208">摄取</text>
  <rect class="ingest" x="145" y="240" width="240" height="70"/>
  <text class="label" x="265" y="275">Markdown path</text>
  <rect class="ingest" x="455" y="240" width="240" height="70"/>
  <text class="label" x="575" y="275">parse metadata</text>
  <rect class="ingest" x="765" y="240" width="240" height="70"/>
  <text class="label" x="885" y="275">split chunks</text>
  <rect class="embed" x="1075" y="240" width="240" height="70"/>
  <text class="label" x="1195" y="275">embed 512维</text>
  <rect class="final" x="1385" y="240" width="260" height="70"/>
  <text class="small" x="1515" y="265">write</text>
  <text class="small" x="1515" y="290">runbook_chunks</text>
  <path class="arrow" d="M385 275H455"/>
  <path class="arrow" d="M695 275H765"/>
  <path class="arrow" d="M1005 275H1075"/>
  <path class="arrow" d="M1315 275H1385"/>

  <rect class="lane" x="60" y="395" width="1680" height="200"/>
  <text class="lane-title" x="110" y="448">检索</text>
  <rect class="search" x="125" y="475" width="230" height="70"/>
  <text class="label" x="240" y="510">Search query</text>
  <rect class="search" x="410" y="475" width="230" height="70"/>
  <text class="label" x="525" y="510">metadata filter</text>
  <rect class="search" x="695" y="475" width="230" height="70"/>
  <text class="small" x="810" y="500">vector</text>
  <text class="small" x="810" y="525">/ lexical</text>
  <rect class="search" x="980" y="475" width="230" height="70"/>
  <text class="label" x="1095" y="510">BM25 hybrid</text>
  <rect class="search" x="1265" y="475" width="230" height="70"/>
  <text class="label" x="1380" y="510">rerank top_k</text>
  <rect class="final" x="1550" y="475" width="150" height="70"/>
  <text class="small" x="1625" y="500">IDs</text>
  <text class="small" x="1625" y="525">+ path</text>
  <path class="arrow" d="M355 510H410"/>
  <path class="arrow" d="M640 510H695"/>
  <path class="arrow" d="M925 510H980"/>
  <path class="arrow" d="M1210 510H1265"/>
  <path class="arrow" d="M1495 510H1550"/>

  <rect class="lane" x="60" y="645" width="1680" height="230"/>
  <text class="lane-title" x="110" y="698">草稿与审查</text>
  <rect class="review" x="140" y="725" width="240" height="70"/>
  <text class="small" x="260" y="750">deterministic</text>
  <text class="small" x="260" y="775">draft</text>
  <rect class="review" x="140" y="825" width="240" height="70"/>
  <text class="small" x="260" y="850">LLM draft</text>
  <text class="small" x="260" y="875">pending_review</text>
  <rect class="review" x="535" y="775" width="240" height="70"/>
  <text class="label" x="655" y="810">human review</text>
  <rect class="final" x="920" y="775" width="240" height="70"/>
  <text class="label" x="1040" y="810">published version</text>
  <rect class="final" x="1305" y="775" width="270" height="70"/>
  <text class="small" x="1440" y="800">ingest approved</text>
  <text class="small" x="1440" y="825">chunks</text>
  <rect class="reject" x="535" y="890" width="240" height="64"/>
  <text class="small" x="655" y="912">forbidden action</text>
  <text class="small" x="655" y="936">reject / revise</text>
  <path class="arrow" d="M380 760H470V810H535"/>
  <path class="arrow" d="M380 860H470V810H535"/>
  <path class="arrow" d="M775 810H920"/>
  <path class="arrow" d="M1160 810H1305"/>
  <path class="arrow-red" d="M655 845V890"/>

  <rect class="callout" x="1030" y="895" width="610" height="58"/>
  <text class="note" x="1335" y="924">RAG 只供证据；M9 默认关闭；LLM 不自动发布</text>
</svg>
