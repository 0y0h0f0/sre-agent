<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="940" viewBox="0 0 1800 940" role="img" aria-labelledby="title desc">
  <title id="title">配置来源与合并优先级</title>
  <desc id="desc">应用 Settings、有效后端配置合并优先级、生产安全默认值和 worker 配置读取边界。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,1 L11,6 L0,11 Z" fill="#334155"/></marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,1 L11,6 L0,11 Z" fill="#15803d"/></marker>
    <marker id="arrow-red" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,1 L11,6 L0,11 Z" fill="#b91c1c"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 44px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle}.subtitle{font:400 23px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}.lane{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.lane-title{font:700 27px Arial,"Noto Sans CJK SC",sans-serif;fill:#334155}.box{fill:#eff6ff;stroke:#2563eb;stroke-width:3;rx:9}.cfg{fill:#f0fdfa;stroke:#0f766e;stroke-width:3;rx:9}.warn{fill:#fffbeb;stroke:#d97706;stroke-width:3;rx:9}.deny{fill:#fef2f2;stroke:#dc2626;stroke-width:3;rx:9}.ok{fill:#f0fdf4;stroke:#16a34a;stroke-width:3;rx:9}.small{font:700 20px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}.note{font:400 21px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}.arrow{stroke:#334155;stroke-width:3.5;fill:none;marker-end:url(#arrow)}.arrow-green{stroke:#15803d;stroke-width:3.5;fill:none;marker-end:url(#arrow-green)}.arrow-red{stroke:#b91c1c;stroke-width:3.5;fill:none;marker-end:url(#arrow-red)}.dash{stroke-dasharray:10 8}
    </style>
  </defs>
  <rect class="bg" width="1800" height="940"/>
  <text class="title" x="900" y="66">配置来源与合并优先级</text>
  <text class="subtitle" x="900" y="105">Settings 负责应用默认值；EffectiveConfig 负责后端 URL 合并；worker 只读取已发布配置</text>

  <rect class="lane" x="70" y="145" width="1660" height="190"/>
  <text class="lane-title" x="110" y="195">应用 Settings</text>
  <rect class="box" x="135" y="235" width="230" height="72"/><text class="small" x="250" y="260">内置默认值</text><text class="small" x="250" y="284">Settings fields</text>
  <rect class="box" x="455" y="235" width="230" height="72"/><text class="small" x="570" y="260">.env</text><text class="small" x="570" y="284">开发配置</text>
  <rect class="box" x="775" y="235" width="230" height="72"/><text class="small" x="890" y="260">环境变量</text><text class="small" x="890" y="284">显式值最高</text>
  <rect class="warn" x="1095" y="235" width="230" height="72"/><text class="small" x="1210" y="260">production</text><text class="small" x="1210" y="284">安全默认值</text>
  <rect class="ok" x="1415" y="235" width="230" height="72"/><text class="small" x="1530" y="260">Settings</text><text class="small" x="1530" y="284">运行时对象</text>
  <path class="arrow" d="M365 271H455"/><path class="arrow" d="M685 271H775"/><path class="arrow" d="M1005 271H1095"/><path class="arrow-green" d="M1325 271H1415"/>

  <rect class="lane" x="70" y="375" width="1660" height="230"/>
  <text class="lane-title" x="110" y="425">Effective backend config</text>
  <rect class="cfg" x="115" y="480" width="210" height="72"/><text class="small" x="220" y="505">env</text><text class="small" x="220" y="529">最高优先级</text>
  <rect class="cfg" x="410" y="480" width="230" height="72"/><text class="small" x="525" y="505">active override</text><text class="small" x="525" y="529">带 TTL</text>
  <rect class="cfg" x="725" y="480" width="210" height="72"/><text class="small" x="830" y="505">profile</text><text class="small" x="830" y="529">环境配置</text>
  <rect class="cfg" x="1020" y="480" width="280" height="72"/><text class="small" x="1160" y="505">published ECV</text><text class="small" x="1160" y="529">worker 可读</text>
  <rect class="cfg" x="1385" y="480" width="230" height="72"/><text class="small" x="1500" y="505">safe default</text><text class="small" x="1500" y="529">降级兜底</text>
  <text class="note" x="900" y="455">合并顺序：env &gt; active override &gt; profile &gt; published EffectiveConfigVersion &gt; safe default</text>
  <path class="arrow-green" d="M325 516H410"/><path class="arrow-green" d="M640 516H725"/><path class="arrow-green" d="M935 516H1020"/><path class="arrow-green" d="M1300 516H1385"/>

  <rect class="lane" x="70" y="645" width="1660" height="170"/>
  <text class="lane-title" x="110" y="695">Worker 读取边界</text>
  <rect class="ok" x="255" y="725" width="300" height="70"/><text class="small" x="405" y="750">latest published config</text><text class="small" x="405" y="774">进入 _build_deps()</text>
  <rect class="deny" x="750" y="725" width="300" height="70"/><text class="small" x="900" y="750">proposal / detected_only</text><text class="small" x="900" y="774">不能进入 worker</text>
  <rect class="warn" x="1245" y="725" width="300" height="70"/><text class="small" x="1395" y="750">unsafe / missing URL</text><text class="small" x="1395" y="774">UnavailableTool degraded</text>
  <path class="arrow-green" d="M1160 552C1080 640 560 640 405 725"/>
  <path class="arrow-red" d="M900 725C980 640 1220 640 1395 725"/>
  <text class="note" x="900" y="870">生产环境不会从 operator-source 合并路径回退到 localhost 后端 URL；executor live 仍需显式发布前确认</text>
</svg>
