<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">生产发布门禁与回滚</title>
  <desc id="desc">生产环境 P0/P1/M9 检查、live backend 特别检查、发布记录和回滚验证流程图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,1 L11,6 L0,11 Z" fill="#334155"/></marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,1 L11,6 L0,11 Z" fill="#15803d"/></marker>
    <marker id="arrow-red" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,1 L11,6 L0,11 Z" fill="#b91c1c"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 44px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle}.subtitle{font:400 23px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}.lane{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.lane-title{font:700 27px Arial,"Noto Sans CJK SC",sans-serif;fill:#334155}.start{fill:#eff6ff;stroke:#2563eb;stroke-width:3;rx:9}.gate{fill:#fffbeb;stroke:#d97706;stroke-width:3;rx:9}.ok{fill:#f0fdf4;stroke:#16a34a;stroke-width:3;rx:9}.deny{fill:#fef2f2;stroke:#dc2626;stroke-width:3;rx:9}.safe{fill:#f0fdfa;stroke:#0f766e;stroke-width:3;rx:9}.small{font:700 20px Arial,"Noto Sans CJK SC",sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:central}.note{font:400 21px Arial,"Noto Sans CJK SC",sans-serif;fill:#475569;text-anchor:middle}.arrow{stroke:#334155;stroke-width:3.5;fill:none;marker-end:url(#arrow)}.arrow-green{stroke:#15803d;stroke-width:3.5;fill:none;marker-end:url(#arrow-green)}.arrow-red{stroke:#b91c1c;stroke-width:3.5;fill:none;marker-end:url(#arrow-red)}
    </style>
  </defs>
  <rect class="bg" width="1800" height="980"/>
  <text class="title" x="900" y="66">生产发布门禁与回滚</text>
  <text class="subtitle" x="900" y="105">P0 未通过不得启用生产 scheduled discovery、Alertmanager poll、live executor 或 M9 能力</text>

  <rect class="lane" x="70" y="145" width="1660" height="205"/>
  <text class="lane-title" x="110" y="195">生产默认值</text>
  <rect class="start" x="150" y="245" width="245" height="76"/><text class="small" x="273" y="270">APP_ENV=production</text><text class="small" x="273" y="296">明确环境</text>
  <rect class="safe" x="500" y="245" width="245" height="76"/><text class="small" x="623" y="270">LLM_PROVIDER</text><text class="small" x="623" y="296">disabled 或受控</text>
  <rect class="safe" x="850" y="245" width="245" height="76"/><text class="small" x="973" y="270">EXECUTOR_BACKEND</text><text class="small" x="973" y="296">fixture 默认</text>
  <rect class="safe" x="1200" y="245" width="245" height="76"/><text class="small" x="1323" y="270">M9_EXTENSIONS</text><text class="small" x="1323" y="296">默认 false</text>
  <path class="arrow-green" d="M395 283H500"/><path class="arrow-green" d="M745 283H850"/><path class="arrow-green" d="M1095 283H1200"/>

  <rect class="lane" x="70" y="390" width="1660" height="230"/>
  <text class="lane-title" x="110" y="440">阻塞式检查</text>
  <rect class="gate" x="135" y="500" width="245" height="78"/><text class="small" x="258" y="525">P0 gate</text><text class="small" x="258" y="551">auth/secret/CI/checkpoint</text>
  <rect class="gate" x="470" y="500" width="245" height="78"/><text class="small" x="593" y="525">Live backend</text><text class="small" x="593" y="551">只读/受控 mutation</text>
  <rect class="gate" x="805" y="500" width="245" height="78"/><text class="small" x="928" y="525">M9 P0</text><text class="small" x="928" y="551">default-off + redaction</text>
  <rect class="ok" x="1140" y="500" width="245" height="78"/><text class="small" x="1263" y="525">P1/P2</text><text class="small" x="1263" y="551">audit/dashboard/backup</text>
  <rect class="deny" x="1475" y="500" width="190" height="78"/><text class="small" x="1570" y="525">未通过</text><text class="small" x="1570" y="551">停止启用</text>
  <path class="arrow-green" d="M380 539H470"/><path class="arrow-green" d="M715 539H805"/><path class="arrow-green" d="M1050 539H1140"/><path class="arrow-red" d="M1385 539H1475"/>

  <rect class="lane" x="70" y="660" width="1660" height="175"/>
  <text class="lane-title" x="110" y="710">发布与回滚记录</text>
  <rect class="ok" x="180" y="735" width="260" height="72"/><text class="small" x="310" y="760">发布记录</text><text class="small" x="310" y="784">commit/image/migration</text>
  <rect class="ok" x="555" y="735" width="260" height="72"/><text class="small" x="685" y="760">smoke eval</text><text class="small" x="685" y="784">JSON/Markdown 存档</text>
  <rect class="safe" x="930" y="735" width="260" height="72"/><text class="small" x="1060" y="760">基础回滚</text><text class="small" x="1060" y="784">fixture/disabled/webhook</text>
  <rect class="safe" x="1305" y="735" width="260" height="72"/><text class="small" x="1435" y="760">M9 回滚</text><text class="small" x="1435" y="784">PRE_M9_TRACE_*</text>
  <path class="arrow-green" d="M440 771H555"/><path class="arrow-green" d="M815 771H930"/><path class="arrow-green" d="M1190 771H1305"/>
  <text class="note" x="900" y="900">回滚后必须验证 /readyz、smoke eval、approval flow 和关键 agentp_* 指标</text>
</svg>
